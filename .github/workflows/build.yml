name: Build

on:
  workflow_dispatch:
    inputs:
      v8_version:
        description: "rusty_v8 crate version (e.g. 130.0.7)"
        required: true
        default: "130.0.7"

jobs:
  build:
    strategy:
      # 一个 target 失败就取消其他——反正要重跑，省时间
      fail-fast: true
      matrix:
        include:
          - target: aarch64-linux-android
            os: ubuntu-latest
            lib_suffix: aarch64-linux-android
          - target: x86_64-linux-android
            os: ubuntu-latest
            lib_suffix: x86_64-linux-android
          - target: aarch64-apple-ios
            os: macos-latest
            lib_suffix: aarch64-apple-ios
          - target: aarch64-apple-ios-sim
            os: macos-latest
            lib_suffix: aarch64-apple-ios-sim

    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120

    env:
      # 所有影响构建产物的外部版本号集中在这里。改动会通过 cache key 失效缓存。
      NDK_VERSION: r26c
      ANDROID_API_LEVEL: "26"
      IOS_DEPLOYMENT_TARGET: "13.0"

    steps:
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build libclang-dev

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Download GN (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -sL -o /tmp/gn.zip "https://chrome-infra-packages.appspot.com/dl/gn/gn/linux-amd64/+/latest"
          mkdir -p /tmp/gn && cd /tmp/gn && unzip -o /tmp/gn.zip && chmod +x gn
          echo "GN=/tmp/gn/gn" >> "$GITHUB_ENV"

      - name: Download GN (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -sL -o /tmp/gn.zip "https://chrome-infra-packages.appspot.com/dl/gn/gn/mac-amd64/+/latest"
          mkdir -p /tmp/gn && cd /tmp/gn && unzip -o /tmp/gn.zip && chmod +x gn
          echo "GN=/tmp/gn/gn" >> "$GITHUB_ENV"

      # rusty_v8 源码缓存（按 V8 版本，跨 target 共享）
      # 排除 third_party/rust-toolchain：build.rs 会下载 OS-specific 的 rustc 二进制进去
      # （macOS ARM64 binary 不能在 Linux 上跑）
      - uses: actions/cache/restore@v4
        id: src-cache
        with:
          path: |
            rusty_v8-src
            !rusty_v8-src/third_party/rust-toolchain
          key: rusty-v8-src-v${{ inputs.v8_version }}

      # rusty_v8 源码：用 actions/checkout（GitHub 原生，对 chromium.googlesource.com
      # submodule 的支持比 cargo 的内置 git lib 更稳定，macOS 上尤其如此）。
      # clean: false 保留 build.rs 往 checkout 里放的未追踪文件（android_platform 等）
      - name: Checkout rusty_v8 source
        if: steps.src-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: denoland/rusty_v8
          ref: v${{ inputs.v8_version }}
          submodules: recursive
          path: rusty_v8-src
          clean: false

      - name: Create build crate
        run: |
          # v8-build 是一个 wrapper crate，通过 path 依赖引用本地 rusty_v8 源码
          mkdir -p v8-build/src
          echo "fn main() {}" > v8-build/src/main.rs
          cat > v8-build/Cargo.toml << 'EOF'
          [package]
          name = "v8-build"
          version = "0.1.0"
          edition = "2021"

          [dependencies]
          v8 = { path = "../rusty_v8-src" }
          EOF

          # 拷贝 rusty_v8 的 Cargo.lock 作为种子，避免 transitive 依赖（icu_calendar 等）
          # 被 cargo 自动 resolve 到不兼容的新版本
          if [ -f rusty_v8-src/Cargo.lock ]; then
            cp rusty_v8-src/Cargo.lock v8-build/Cargo.lock
          fi

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: v8-build
          key: ${{ matrix.target }}-${{ inputs.v8_version }}

      # NDK 缓存（跨 V8 版本复用，存到独立路径；只在 Android 目标用，runner 固定 Linux）
      - uses: actions/cache/restore@v4
        id: ndk-cache
        if: contains(matrix.target, 'android')
        with:
          path: /tmp/android-ndk-${{ env.NDK_VERSION }}
          key: android-ndk-${{ env.NDK_VERSION }}

      # V8 编译产物（target + V8 版本专属，host OS 隐含在 matrix.target 里）
      # - gn_out: ninja 编译产物（几 GB，含 host 和 target 的 .o/.a）
      # - clang: Chromium 下载的 host clang（~640MB）
      # 不加 restore-keys——老版本 gn_out 混进来会让 ninja 时间戳状态混乱
      - uses: actions/cache/restore@v4
        id: v8-cache
        with:
          path: |
            v8-build/target/${{ matrix.target }}/release/gn_out
            v8-build/target/${{ matrix.target }}/release/clang
          key: ${{ contains(matrix.target, 'android') && format('v8-deps-{0}-v{1}-api{2}', matrix.target, inputs.v8_version, env.ANDROID_API_LEVEL) || format('v8-deps-{0}-v{1}-ios{2}', matrix.target, inputs.v8_version, env.IOS_DEPLOYMENT_TARGET) }}

      - name: Prepare Android NDK
        if: contains(matrix.target, 'android')
        run: |
          V8_SRC="$GITHUB_WORKSPACE/rusty_v8-src"
          echo "V8_SRC=$V8_SRC" >> "$GITHUB_ENV"

          # NDK 存在独立路径（/tmp/android-ndk-<version>），V8 里用 symlink 引用
          NDK_CACHE_DIR="/tmp/android-ndk-${NDK_VERSION}"
          if [ ! -d "$NDK_CACHE_DIR" ]; then
            curl -L -o /tmp/ndk.zip "https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip"
            unzip -q -d /tmp /tmp/ndk.zip
            mv "/tmp/android-ndk-${NDK_VERSION}" "$NDK_CACHE_DIR" 2>/dev/null || true
            rm /tmp/ndk.zip
          fi

          # Symlink 进 V8 期望的位置
          NDK_DIR="$V8_SRC/third_party/android_ndk"
          ln -sfn "$NDK_CACHE_DIR" "$NDK_DIR"

          # Symlink android_toolchain/ndk -> android_ndk
          mkdir -p "$V8_SRC/third_party/android_toolchain"
          ln -sfn "$NDK_DIR" "$V8_SRC/third_party/android_toolchain/ndk"

          # Create pydeps stubs
          AB="$V8_SRC/build/android"
          mkdir -p "$AB/pylib/results/presentation" "$AB/test_wrapper"
          for f in devil_chromium.pydeps apk_operations.pydeps test_runner.pydeps resource_sizes.pydeps; do
            touch "$AB/$f"
          done
          touch "$AB/pylib/results/presentation/test_results_presentation.pydeps"
          touch "$AB/test_wrapper/logdog_wrapper.pydeps"

          # v8 140+ 需要 build/rust/known-target-triples.txt（rusty_v8 精简源码时漏了）
          mkdir -p "$V8_SRC/build/rust"
          cat > "$V8_SRC/build/rust/known-target-triples.txt" << 'TRIPLES'
          aarch64-linux-android
          armv7-linux-androideabi
          x86_64-linux-android
          i686-linux-android
          aarch64-apple-ios
          aarch64-apple-ios-sim
          x86_64-apple-ios
          aarch64-unknown-linux-gnu
          x86_64-unknown-linux-gnu
          aarch64-apple-darwin
          x86_64-apple-darwin
          x86_64-pc-windows-msvc
          aarch64-pc-windows-msvc
          TRIPLES

          # Configure linker
          LINKER="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${ANDROID_API_LEVEL}-clang"
          if [ "${{ matrix.target }}" = "x86_64-linux-android" ]; then
            LINKER="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android${ANDROID_API_LEVEL}-clang"
          fi
          mkdir -p v8-build/.cargo
          cat > v8-build/.cargo/config.toml << TOML
          [target.${{ matrix.target }}]
          linker = "$LINKER"
          rustflags = ["-C", "link-args=-Wl,--allow-multiple-definition"]
          TOML

          # BINDGEN_EXTRA_CLANG_ARGS 的取舍：
          # - v140+ 有 tools/get_bindgen_args.py 自己给 bindgen 配置参数，
          #   我们设 env var 会污染 V8 内部 ninja 的 host bindgen 调用
          #   （把 aarch64 target 附加到 x86 host 命令，导致 -msse3 unsupported）
          # - v130-v139 没有这个脚本，build.rs 里的 bindgen 依赖外部 env var
          #   找到 NDK sysroot 里的 C++ 头（cstdint 等）
          # 以文件存在与否区分版本
          if [ ! -f "$V8_SRC/tools/get_bindgen_args.py" ]; then
            NDK_SYSROOT="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
            ARCH_INCLUDE="aarch64-linux-android"
            if [ "${{ matrix.target }}" = "x86_64-linux-android" ]; then
              ARCH_INCLUDE="x86_64-linux-android"
            fi
            echo "LIBCLANG_PATH=/usr/lib/x86_64-linux-gnu" >> "$GITHUB_ENV"
            BINDGEN_VAR="BINDGEN_EXTRA_CLANG_ARGS_$(echo '${{ matrix.target }}' | tr '-' '_')"
            echo "${BINDGEN_VAR}=--sysroot=$NDK_SYSROOT -isystem $NDK_SYSROOT/usr/include/c++/v1 -isystem $NDK_SYSROOT/usr/include -isystem $NDK_SYSROOT/usr/include/$ARCH_INCLUDE --target=${{ matrix.target }}${ANDROID_API_LEVEL}" >> "$GITHUB_ENV"
          fi

      - name: Prepare iOS bindgen args (v130-v139 only)
        if: contains(matrix.target, 'apple-ios')
        run: |
          V8_SRC="$GITHUB_WORKSPACE/rusty_v8-src"
          # 和 Android 同样的逻辑：v140+ 不需要，v130-v139 需要
          if [ ! -f "$V8_SRC/tools/get_bindgen_args.py" ]; then
            if [ "${{ matrix.target }}" = "aarch64-apple-ios-sim" ]; then
              SDK=$(xcrun --sdk iphonesimulator --show-sdk-path)
              CLANG_TARGET="arm64-apple-ios${IOS_DEPLOYMENT_TARGET}-simulator"
            else
              SDK=$(xcrun --sdk iphoneos --show-sdk-path)
              CLANG_TARGET="arm64-apple-ios${IOS_DEPLOYMENT_TARGET}"
            fi
            BINDGEN_VAR="BINDGEN_EXTRA_CLANG_ARGS_$(echo '${{ matrix.target }}' | tr '-' '_')"
            echo "${BINDGEN_VAR}=-isysroot $SDK --target=$CLANG_TARGET" >> "$GITHUB_ENV"
          fi

      - name: Build V8 from source
        env:
          V8_FROM_SOURCE: "1"
          NINJA: /usr/bin/ninja
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            export NINJA=$(which ninja)
          fi
          cd v8-build
          cargo build --target ${{ matrix.target }} --release

      # 保存 NDK 缓存（跨 V8 版本复用）
      - uses: actions/cache/save@v4
        if: always() && contains(matrix.target, 'android') && steps.ndk-cache.outputs.cache-hit != 'true'
        with:
          path: /tmp/android-ndk-${{ env.NDK_VERSION }}
          key: android-ndk-${{ env.NDK_VERSION }}

      # 保存 rusty_v8-src（save 抓整个目录，包括 build.rs 放进来的
      # android_platform/catapult/build/linux 等未追踪文件）
      # 排除 third_party/rust-toolchain：OS-specific 二进制不能跨 OS 共享
      - uses: actions/cache/save@v4
        if: always() && steps.src-cache.outputs.cache-hit != 'true'
        with:
          path: |
            rusty_v8-src
            !rusty_v8-src/third_party/rust-toolchain
          key: rusty-v8-src-v${{ inputs.v8_version }}

      # 保存 V8 编译产物——即使 build 失败也保存，下次重试可以复用已完成的部分
      - uses: actions/cache/save@v4
        if: always() && steps.v8-cache.outputs.cache-hit != 'true'
        with:
          path: |
            v8-build/target/${{ matrix.target }}/release/gn_out
            v8-build/target/${{ matrix.target }}/release/clang
          key: ${{ contains(matrix.target, 'android') && format('v8-deps-{0}-v{1}-api{2}', matrix.target, inputs.v8_version, env.ANDROID_API_LEVEL) || format('v8-deps-{0}-v{1}-ios{2}', matrix.target, inputs.v8_version, env.IOS_DEPLOYMENT_TARGET) }}

      - name: Extract artifacts
        run: |
          TARGET=${{ matrix.target }}
          SUFFIX=${{ matrix.lib_suffix }}
          BUILD_DIR="v8-build/target/$TARGET/release"

          # Static library
          LIB=$(find "$BUILD_DIR" -name "librusty_v8.a" | head -1)
          if [ -z "$LIB" ]; then
            echo "::error::librusty_v8.a not found"
            exit 1
          fi
          OUTNAME="librusty_v8_release_${SUFFIX}.a"
          cp "$LIB" "$OUTNAME"
          gzip -f "$OUTNAME"
          ls -lh "${OUTNAME}.gz"

          # Binding file (generated by V8 build, needed by v8 crate consumers)
          BINDING=$(find "$BUILD_DIR" -name "src_binding.rs" -path "*/gn_out/*" | head -1)
          if [ -z "$BINDING" ]; then
            # Fallback: search more broadly
            BINDING=$(find "$BUILD_DIR" -name "src_binding.rs" | head -1)
          fi
          if [ -n "$BINDING" ]; then
            cp "$BINDING" "src_binding_release_${SUFFIX}.rs"
            ls -lh "src_binding_release_${SUFFIX}.rs"
          else
            echo "::error::src_binding.rs not found"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: librusty_v8-${{ matrix.lib_suffix }}
          path: |
            *.a.gz
            *.rs

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - run: ls -lh *.a.gz *.rs 2>/dev/null || true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.v8_version }}
          name: "rusty_v8 v${{ inputs.v8_version }}"
          body: |
            Prebuilt `librusty_v8.a` for mobile targets, compiled from [rusty_v8 v${{ inputs.v8_version }}](https://github.com/denoland/rusty_v8/releases/tag/v${{ inputs.v8_version }}).

            Usage:
            ```bash
            RUSTY_V8_ARCHIVE=/path/to/librusty_v8_release_<target>.a cargo build --target <target>
            ```
          files: |
            *.a.gz
            *.rs
